<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Promotion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Scene 1 -->
        <div class="scene" id="scene-1">
            <img id="img-scene1" src="" alt="Product Shot" class="bg-img">
            <div class="overlay"></div>
            <div class="content">
                <h1 class="fade-up anim-delay-1" id="s1-title"></h1>
                <h2 class="fade-up anim-delay-2" id="s1-subtitle"></h2>
                <p class="fade-up anim-delay-3" id="s1-tagline" style="font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 5px; margin-top: 2rem;"></p>
            </div>
        </div>

        <!-- Scene 2 -->
        <div class="scene" id="scene-2">
            <img id="img-scene2" src="" alt="Lifestyle Shot" class="bg-img">
            <div class="overlay"></div>
            <div class="content">
                <h1 class="fade-up anim-delay-1" id="s2-title"></h1>
                <h2 class="fade-up anim-delay-2" id="s2-subtitle"></h2>
            </div>
        </div>

        <!-- Scene 3 -->
        <div class="scene" id="scene-3">
            <div class="content middle">
                <h1 class="logo zoom-in anim-delay-1" id="s3-logo"></h1>
                <p class="fade-up anim-delay-2" id="s3-cta" style="font-family: 'Montserrat', sans-serif; letter-spacing: 4px; margin-top: 1rem;"></p>
            </div>
        </div>
    </div>
    
    <!-- Load config first, then the script -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
